<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第91回 TOPIK II 閱讀測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a2744;
    --navy-light: #243459;
    --gold: #b8952a;
    --gold-light: #d4b04a;
    --cream: #faf8f3;
    --cream-dark: #f0ebe0;
    --text: #1e1e1e;
    --text-muted: #5a5a6a;
    --correct: #1e6b3c;
    --correct-bg: #e8f5ed;
    --wrong: #8b1a1a;
    --wrong-bg: #fde8e8;
    --border: #d8d0c0;
    --shadow: 0 4px 24px rgba(26,39,68,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', 'Noto Serif KR', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .header-title { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
  .header-score {
    font-size: 13px;
    background: rgba(255,255,255,0.12);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    background: var(--navy-light);
    height: 4px;
  }
  .progress-bar {
    height: 4px;
    background: var(--gold-light);
    transition: width 0.4s ease;
  }

  /* ── PASSWORD ── */
  .password-box {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    text-align: left;
  }
  .password-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .password-input-wrap input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 18px;
    color: var(--navy);
    background: var(--cream);
    outline: none;
    letter-spacing: 6px;
    transition: border-color 0.2s;
  }
  .password-input-wrap input:focus {
    border-color: var(--navy);
    background: white;
  }
  .password-error {
    display: none;
    margin-top: 8px;
    font-size: 12px;
    color: var(--wrong);
    font-weight: 600;
  }

  /* ── HOME BUTTON & MODAL ── */
  .btn-home {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-home:active { background: rgba(255,255,255,0.28); }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white;
    border-radius: 20px;
    padding: 28px 24px 20px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
    text-align: center;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-icon { font-size: 38px; margin-bottom: 12px; }
  .modal-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .modal-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .modal-desc strong { color: var(--wrong); }
  .modal-buttons { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .modal-btn-cancel {
    background: var(--cream-dark);
    color: var(--navy);
    border: 1.5px solid var(--border);
  }
  .modal-btn-confirm {
    background: var(--wrong);
    color: white;
  }
  .modal-btn:active { transform: scale(0.97); }

  /* ── TERMS ── */
  .terms-box {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    text-align: left;
  }
  .terms-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1.5px solid var(--cream-dark);
    letter-spacing: 0.5px;
  }
  .terms-content {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .terms-content p {
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--text);
  }
  .terms-content a {
    color: var(--navy);
    text-decoration: underline;
  }
  .terms-check-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 10px 14px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    transition: all 0.2s;
  }
  .terms-check-label:has(input:checked) {
    background: var(--correct-bg);
    border-color: var(--correct);
  }
  .terms-check-label input[type="checkbox"] {
    display: none;
  }
  .custom-check {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 13px;
  }
  .terms-check-label:has(input:checked) .custom-check {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }
  .terms-check-label:has(input:checked) .custom-check::after {
    content: '✓';
    color: white;
    font-weight: 800;
    font-size: 13px;
  }
  .terms-check-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .btn-start:disabled {
    background: #9aa3b5;
    box-shadow: none;
    cursor: not-allowed;
    opacity: 0.6;
  }

  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
    padding: 40px 24px;
    text-align: center;
  }
  .start-badge {
    background: var(--navy);
    color: var(--gold-light);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }
  .start-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .start-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }
  .start-info {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
  }
  .start-info-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--cream-dark);
  }
  .start-info-row:last-child { border-bottom: none; }
  .start-info-label { color: var(--text-muted); }
  .start-info-value { font-weight: 600; color: var(--navy); }
  .btn-start {
    background: var(--navy);
    color: white;
    border: none;
    padding: 16px 48px;
    font-size: 16px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 6px 20px rgba(26,39,68,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:active { transform: scale(0.97); }

  /* ── QUIZ SCREEN ── */
  .quiz-screen { display: none; padding-bottom: 100px; }
  .group-header {
    background: var(--navy);
    color: white;
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    opacity: 0.9;
  }

  /* ── PASSAGE ── */
  .passage-wrap {
    background: white;
    margin: 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .passage-label {
    background: var(--cream-dark);
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .passage-text {
    padding: 18px 16px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14.5px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .given-sentence-wrap {
    background: #f5f0e8;
    border-left: 3px solid var(--gold);
    margin: 16px 16px 0;
    padding: 14px 16px;
    border-radius: 0 10px 10px 0;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    line-height: 1.9;
    color: var(--navy);
  }
  .given-sentence-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: white;
    margin: 16px;
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .question-header {
    background: var(--navy);
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .q-number {
    background: var(--gold);
    color: white;
    font-size: 12px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .q-instruction {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    line-height: 1.5;
  }
  .question-body { padding: 16px; }
  .question-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 14.5px;
    line-height: 1.9;
    margin-bottom: 16px;
    color: var(--text);
    white-space: pre-wrap;
    word-break: keep-all;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-size: 14px;
    line-height: 1.6;
    font-family: 'Noto Serif KR', serif;
    color: var(--text);
    word-break: keep-all;
  }
  .option-btn:active { transform: scale(0.99); }
  .option-btn:not(.answered):hover {
    border-color: var(--navy);
    background: #eef1f7;
  }
  .option-num {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    font-family: 'Noto Sans TC', sans-serif;
  }
  .option-btn.correct {
    background: var(--correct-bg);
    border-color: var(--correct);
  }
  .option-btn.correct .option-num {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }
  .option-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
  }
  .option-btn.wrong .option-num {
    background: var(--wrong);
    border-color: var(--wrong);
    color: white;
  }
  .option-btn.show-correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    opacity: 0.7;
  }
  .option-btn.show-correct .option-num {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
  }
  .option-btn.answered { cursor: default; }

  /* ── EXPLANATION ── */
  .explanation {
    display: none;
    margin: 14px 0 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .explanation.show { display: block; }
  .exp-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
  }
  .exp-header.correct-header { background: var(--correct); }
  .exp-header.wrong-header { background: var(--wrong); }
  .exp-body {
    padding: 14px;
    font-size: 13.5px;
    line-height: 1.8;
    color: var(--text);
    background: white;
    word-break: keep-all;
  }
  .exp-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }
  .exp-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 12px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .btn-nav {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-prev {
    background: var(--cream-dark);
    color: var(--navy);
    border: 1.5px solid var(--border);
  }
  .btn-next {
    background: var(--navy);
    color: white;
    box-shadow: 0 4px 14px rgba(26,39,68,0.25);
  }
  .btn-nav:disabled { opacity: 0.35; cursor: default; }
  .btn-nav:not(:disabled):active { transform: scale(0.97); }

  /* ── RESULT SCREEN ── */
  .result-screen {
    display: none;
    padding: 32px 20px 60px;
    text-align: center;
  }
  .result-badge {
    font-size: 56px;
    margin-bottom: 16px;
  }
  .result-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .result-score-wrap {
    background: var(--navy);
    color: white;
    border-radius: 20px;
    padding: 28px;
    margin: 24px 0;
    box-shadow: var(--shadow);
  }
  .result-score-main {
    font-size: 52px;
    font-weight: 800;
    line-height: 1;
    color: var(--gold-light);
  }
  .result-score-denom { font-size: 20px; opacity: 0.7; margin-left: 4px; }
  .result-score-label { font-size: 13px; opacity: 0.7; margin-top: 8px; }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .stat-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 12px;
    box-shadow: var(--shadow);
  }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--navy); }
  .stat-num.green { color: var(--correct); }
  .stat-num.red { color: var(--wrong); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .result-level {
    background: linear-gradient(135deg, #1a2744, #243459);
    color: white;
    border-radius: 16px;
    padding: 20px;
    margin: 20px 0;
    font-size: 14px;
    line-height: 1.8;
  }
  .result-level strong { color: var(--gold-light); font-size: 16px; }
  .btn-retry {
    background: var(--navy);
    color: white;
    border: none;
    padding: 16px 40px;
    font-size: 15px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 6px 20px rgba(26,39,68,0.25);
    transition: transform 0.15s;
  }
  .btn-retry:active { transform: scale(0.97); }

  /* ── REVIEW LIST ── */
  .review-section { margin-top: 32px; text-align: left; }
  .review-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--navy);
  }
  .review-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--cream-dark);
    font-size: 13px;
  }
  .review-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .review-dot.ok { background: var(--correct); }
  .review-dot.fail { background: var(--wrong); }
  .review-q { color: var(--text-muted); flex-shrink: 0; }
  .review-status { margin-left: auto; font-weight: 600; font-size: 12px; }
  .review-status.ok { color: var(--correct); }
  .review-status.fail { color: var(--wrong); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🇰🇷 TOPIK II · 第91回 閱讀</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="header-score" id="headerScore" style="display:none">✅ <span id="scoreDisplay">0</span> / 50</div>
    <button class="btn-home" id="btnHome" style="display:none" onclick="showHomeModal()">🏠 回主畫面</button>
  </div>
</div>

<!-- HOME MODAL -->
<div class="modal-overlay" id="homeModal">
  <div class="modal-box">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">清除作答進度並回主畫面？</div>
    <div class="modal-desc">目前的所有作答記錄將會<strong>完全清除</strong>，且無法復原。</div>
    <div class="modal-buttons">
      <button class="modal-btn modal-btn-cancel" onclick="closeHomeModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="goHome()">確定</button>
    </div>
  </div>
</div>
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
  <div class="start-badge">TOPIK II Reading</div>
  <div class="start-title">第91回<br>한국어능력시험</div>
  <div class="start-sub">읽기（閱讀）模擬測驗</div>
  <div class="start-info">
    <div class="start-info-row">
      <span class="start-info-label">題目數量</span>
      <span class="start-info-value">50 題</span>
    </div>
    <div class="start-info-row">
      <span class="start-info-label">答題後</span>
      <span class="start-info-value">立即顯示解析</span>
    </div>
    <div class="start-info-row">
      <span class="start-info-label">解析語言</span>
      <span class="start-info-value">韓文 + 中文</span>
    </div>
    <div class="start-info-row">
      <span class="start-info-label">成績記錄</span>
      <span class="start-info-value">完成後顯示報告</span>
    </div>
  </div>
  <div class="password-box">
    <div class="password-label">🔒 請輸入密碼</div>
    <div class="password-input-wrap">
      <input type="password" id="passwordInput" placeholder="請輸入密碼" maxlength="10" oninput="toggleStart()" onkeydown="if(event.key==='Enter') document.getElementById('btnStart').click()">
    </div>
    <div class="password-error" id="passwordError">⚠️ 密碼錯誤，請再試一次</div>
  </div>
  <div class="terms-box">
    <div class="terms-title">📋 使用規範</div>
    <div class="terms-content">
      <p>⛔ <strong>嚴禁</strong>商業盈利或補教轉售行為。</p>

<script>
const RAW = [{"id":1,"section":"1~2","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오.","passage":null,"question":"나는 오래전에 설악산을 ( ).","options":["등산하고 싶다","등산해도 된다","등산할 것 같다","등산한 적이 있다"],"answer":4,"explanation":{"ko":"문장에 '오래전에'라는 과거 시간 표현이 있으므로, 과거의 경험을 나타내는 문법 '-(으)ㄴ 적이 있다'가 알맞습니다. ①은 현재의 희망, ②는 허락, ③은 추측을 나타내므로 문맥에 맞지 않습니다.","zh":"句子中有「오래전에（很久以前）」這個過去時間詞，因此要填入表示過去經驗的文法「-(으)ㄴ 적이 있다（曾經…過）」。①表示現在的願望，②表示許可，③表示推測，均與語境不符。正解：④「曾經爬過雪嶽山」"}},{"id":2,"section":"1~2","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오.","passage":null,"question":"새집으로 ( ) 가구를 새로 샀다.","options":["이사한 지","이사하거든","이사하려면","이사하고 나서"],"answer":4,"explanation":{"ko":"'이사하고 나서'는 '이사한 후에'의 의미로, 이사가 완료된 다음 가구를 구입했다는 순서를 자연스럽게 표현합니다. ①'이사한 지'는 경과 시간과 함께 써야 하고, ②'이사하거든'은 조건, ③'이사하려면'은 목적/조건으로 문맥에 어울리지 않습니다.","zh":"「이사하고 나서」意為「搬家之後」，表達先搬家、後購買家具的先後順序，最為自然。①「이사한 지」需與時間段搭配使用，②「이사하거든」表條件，③「이사하려면」表目的/條件，均不符合語境。正解：④「搬進新家之後，買了新家具」"}},{"id":3,"section":"3~4","instruction":"밑줄 친 부분과 의미가 가장 비슷한 것을 고르십시오.","passage":null,"question":"어려운 이웃을 돕고자 매년 봉사 활동에 참여하고 있다.","options":["돕기 위해서","돕는 대신에","돕기 무섭게","돕는 바람에"],"answer":1,"explanation":{"ko":"'-고자'는 어떤 행동을 하려는 의도나 목적을 나타내는 문법으로, '-기 위해서'와 의미가 같습니다. ②'대신에'는 대체, ③'무섭게'는 '하자마자'의 뜻, ④'바람에'는 부정적 원인을 나타냅니다.","zh":"「-고자」是表示意圖或目的的文法，與「-기 위해서（為了…）」意思相同。②「대신에」表替代，③「무섭게」意為「一…就立刻…」，④「바람에」表不好的原因結果，均不符。正解：①「為了幫助困難的鄰居，每年參加志願活動」"}},{"id":4,"section":"3~4","instruction":"밑줄 친 부분과 의미가 가장 비슷한 것을 고르십시오.","passage":null,"question":"지난 3년 동안 영화를 한 편 봤으니 거의 안 본 셈이다.","options":["본 척했다","보기 나름이다","볼 수밖에 없었다","본 거나 마찬가지다"],"answer":4,"explanation":{"ko":"'-ㄴ 셈이다'는 '사실상 ~과 같다'는 의미로, '-(으)ㄴ/는 거나 마찬가지다'와 같은 뜻입니다. ①'척했다'는 거짓으로 하는 체함, ②'나름이다'는 사람에 따라 다름, ③'수밖에 없었다'는 불가피함을 뜻합니다.","zh":"「-ㄴ 셈이다」意為「事實上相當於…」，與「-(으)ㄴ 거나 마찬가지다（和…差不多/等於…）」意思相同。①「척했다」表裝作，②「나름이다」表因人而異，③「수밖에 없었다」表不得不。正解：④「3年間只看了一部電影，等於幾乎沒看過」"}},{"id":5,"section":"5~8","instruction":"다음은 무엇에 대한 글인지 고르십시오.","passage":"입속 치아 사이사이를 깨끗이!\n부드럽게 잘 닦여요~","question":"위 광고는 무엇에 대한 글입니까?","options":["비누","칫솔","안경","수건"],"answer":2,"explanation":{"ko":"'치아 사이사이를 깨끗이', '부드럽게 잘 닦여요'라는 표현은 치아를 닦는 도구인 칫솔의 광고임을 알 수 있습니다.","zh":"廣告中提到「牙齒縫隙清潔乾淨」、「溫柔地擦拭」，這些都是描述刷牙工具的特點，因此廣告內容是關於牙刷（칫솔）的。正解：②"}},{"id":6,"section":"5~8","instruction":"다음은 무엇에 대한 글인지 고르십시오.","passage":"아이들의 예쁜 꿈과 희망을 키워 주는 곳\n부모의 마음으로 보살핍니다.","question":"위 광고는 어떤 장소에 대한 글입니까?","options":["은행","서점","유치원","우체국"],"answer":3,"explanation":{"ko":"'아이들의 꿈과 희망을 키워 주는 곳', '부모의 마음으로 보살핀다'는 표현은 아이들을 돌봐주는 유치원을 묘사합니다.","zh":"「培育孩子美麗夢想與希望的地方」、「用父母的心照顧」，這些描述指向照顧兒童的機構——幼兒園（유치원）。正解：③"}},{"id":7,"section":"5~8","instruction":"다음은 무엇에 대한 글인지 고르십시오.","passage":"계단으로 다니기! 하루 30분 운동하기!\n우리 몸을 위해 실천하세요.","question":"위 글은 무엇에 대한 내용입니까?","options":["건강 관리","안전 운전","전화 예절","절약 습관"],"answer":1,"explanation":{"ko":"계단 이용과 매일 30분 운동을 권장하는 내용으로, 신체 건강을 위한 생활 습관, 즉 '건강 관리'에 관한 글입니다.","zh":"內容提倡走樓梯、每天運動30分鐘，都是促進身體健康的生活習慣，屬於「健康管理（건강 관리）」的主題。正解：①"}},{"id":8,"section":"5~8","instruction":"다음은 무엇에 대한 글인지 고르십시오.","passage":"✓ 공연장 내에서는 사진 촬영을 금지합니다.\n✓ 휴대 전화는 전원을 끄거나 진동으로 해 주십시오.","question":"위 글은 무엇에 대한 내용입니까?","options":["관람 규칙","제품 소개","사용 방법","예약 문의"],"answer":1,"explanation":{"ko":"공연장 내 사진 촬영 금지와 휴대폰 매너 모드 요청은 공연 관람 시 지켜야 할 규칙입니다. 따라서 '관람 규칙'에 해당합니다.","zh":"禁止在表演場所拍照、手機調靜音或關機，這些都是觀賞表演時應遵守的規定，屬於「觀覽規則（관람 규칙）」。正解：①"}},{"id":9,"section":"9~12","instruction":"다음 글 또는 그래프의 내용과 같은 것을 고르십시오.","passage":"[인주시 야경 관광버스 운행 안내]\n10월의 아름다운 밤을 즐겨 보세요.\n• 관광 장소: 인주역 광장 출발 → 인주산 전망대 → 별빛공원\n• 출발 시간: 매일 18:00\n• 이용 요금: 성인 10,000원 / 학생 5,000원 (7세 이하 무료)\n• 예약 방법: 출발 하루 전까지 홈페이지(www.inju-tour.com)에서 신청","question":"안내문의 내용과 같은 것을 고르십시오.","options":["성인과 학생의 버스 요금이 같다.","이 버스는 별빛공원에서 출발한다.","매일 오전에 이 버스를 탈 수 있다.","이 버스를 타려면 미리 신청해야 한다."],"answer":4,"explanation":{"ko":"①성인 10,000원, 학생 5,000원으로 요금이 다릅니다. ②출발지는 인주역 광장이고 별빛공원은 도착지 중 하나입니다. ③출발 시간은 매일 18:00(오후)입니다. ④예약은 출발 하루 전까지 홈페이지에서 해야 하므로 '미리 신청해야 한다'는 내용이 맞습니다.","zh":"①成人10,000韓元、學生5,000韓元，費用不同。②出發地是仁州站廣場，星光公園是目的地之一，並非出發地。③出發時間是每天18:00（傍晚），並非上午。④預約需在出發前一天前在官網申請，必須提前預訂。正解：④"}},{"id":10,"section":"9~12","instruction":"다음 글 또는 그래프의 내용과 같은 것을 고르십시오.","passage":"[인주시 직장인, 출퇴근 시 이동 수단]\n(2012년 → 2022년 비교, 조사 대상: 직장인 1,000명)\n• 자가용: 31% → 39%\n• 버스: 28% → 21%\n• 지하철: 24% → 27%\n• 걸어서: 11% → 5%\n• 기타: 6% → 8%","question":"그래프의 내용과 같은 것을 고르십시오.","options":["자가용으로 출퇴근한다고 응답한 직장인들의 비율이 줄었다.","걸어서 출퇴근하는 직장인은 2012년보다 2022년이 더 적었다.","2022년에는 지하철을 타고 출퇴근하는 직장인이 가장 많았다.","2012년에 직장인들은 출퇴근할 때 버스를 제일 많이 이용했다."],"answer":2,"explanation":{"ko":"①자가용 비율은 31%→39%로 증가했습니다. ②걸어서 출퇴근하는 비율이 11%→5%로 줄었으므로 맞습니다. ③2022년에 가장 많은 수단은 자가용(39%)입니다. ④2012년에 가장 많이 이용한 수단도 자가용(31%)입니다.","zh":"①自駕車比例從31%升至39%，是增加而非減少。②步行通勤從11%降至5%，2022年確實比2012年少，正確。③2022年最多人使用的是自駕車（39%），不是地鐵。④2012年最多人使用的也是自駕車（31%），不是公車。正解：②"}},{"id":11,"section":"9~12","instruction":"다음 글 또는 그래프의 내용과 같은 것을 고르십시오. (각 2점)","passage":"인주시가 작년에 이어 올해도 10월 한 달간 '찾아가는 자전거 수리 센터'를 운영한다. 평일에는 여러 지역을 직접 방문해 고쳐 주고 주말에는 인주공원에서 수리 서비스를 제공한다. 전문 수리 기사가 자전거를 무료로 고쳐 주고 부품 교체가 필요한 경우에는 저렴한 가격으로 바꿔 준다. 시는 시민들의 자전거 타기 생활화를 위해 이 수리 센터를 운영하는 것이라고 밝혔다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["이 서비스는 일 년 내내 운영된다.","올해 처음으로 이 센터가 운영되기 시작했다.","주말에는 인주공원에서 수리를 받을 수 있다.","이 수리 센터에서는 무료로 부품을 교체해 준다."],"answer":3,"explanation":{"ko":"①본문에서 '10월 한 달간' 운영한다고 했으므로 일 년 내내 운영되는 것은 아닙니다. ②'작년에 이어 올해도'라고 했으므로 올해 처음이 아닙니다. ③'주말에는 인주공원에서 수리 서비스를 제공한다'는 내용이 그대로 언급되어 있으므로 정답입니다. ④부품 교체는 '저렴한 가격'으로 바꿔 주는 것이지 무료가 아닙니다.","zh":"①文中說「10月整個月」運營，並非全年。②「繼去年之後今年也」說明並非今年首次。③「週末在仁州公園提供修理服務」與選項③完全吻合，為正解。④零件更換是「以低廉的價格」，並非免費。正解：③"}},{"id":12,"section":"9~12","instruction":"다음 글 또는 그래프의 내용과 같은 것을 고르십시오. (각 2점)","passage":"피자 가게를 운영하는 김민수 씨의 사연이 잔잔한 감동을 주고 있다. 최근 김 씨는 피자를 배달하러 가다가 오토바이가 빗길에 미끄러지는 사고를 당했다. 다행히 사람이 다치는 피해는 없었지만 피자가 망가져서 배달에 문제가 생겼다. 배달이 늦어지는 것에 대해 김 씨가 고객에게 연락하자 고객은 \"천천히 오셔도 돼요. 몸은 괜찮나요?\"라며 따뜻한 말부터 전했다고 한다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["고객은 주문한 피자를 취소하겠다고 말했다.","사고가 생겨서 배달 중이던 피자가 망가졌다.","오토바이가 빗길에 미끄러져서 김 씨가 다쳤다.","김 씨는 피자를 시킨 고객에게 연락하다 사고가 났다."],"answer":2,"explanation":{"ko":"①고객은 취소가 아니라 '천천히 오셔도 돼요'라며 배려하는 말을 했습니다. ②'피자가 망가져서 배달에 문제가 생겼다'는 내용이 그대로 일치하므로 정답입니다. ③'사람이 다치는 피해는 없었다'고 했으므로 김 씨는 다치지 않았습니다. ④사고가 먼저 났고, 그 후에 고객에게 연락한 것입니다.","zh":"①顧客說的是「慢慢來也沒關係」，並非取消訂單。②「披薩因事故損壞導致配送出現問題」與選項②完全一致，為正解。③文中說「幸好沒有人員受傷」，金先生並未受傷。④是先發生事故，之後才聯絡顧客。正解：②"}},{"id":13,"section":"13~15","instruction":"다음을 순서에 맞게 배열한 것을 고르십시오. (각 2점)","passage":null,"question":"다음 (가)~(라)를 순서에 맞게 배열한 것을 고르십시오.\n\n(가) 짧게는 하루, 길게는 한 달 정도 반짝 운영하는 임시 매장이다.\n(나) 사람이 붐비는 장소에서 짧은 기간 동안 운영하는 매장이 유행이다.\n(다) 기업은 이 임시 매장을 이용해 주로 특정 제품을 팔거나 홍보를 한다.\n(라) 또 기업 이미지를 친숙하게 만들기 위해 재미있는 행사를 열기도 한다.","options":["(가) – (다) – (라) – (나)","(나) – (가) – (다) – (라)","(가) – (라) – (나) – (다)","(나) – (라) – (다) – (가)"],"answer":2,"explanation":{"ko":"(나)에서 화제를 도입하고, (가)에서 구체적 정의를, (다)에서 목적을, (라)에서 '또'로 추가 목적을 설명합니다. 따라서 (나)→(가)→(다)→(라) 순서가 자연스럽습니다.","zh":"(나)先引入話題：在人潮聚集場所短期營業的店鋪正在流行。(가)具體定義：短則一天、長則約一個月的臨時商店。(다)說明主要目的：銷售特定商品或宣傳。(라)以「또（另外）」連接，補充另一目的。正確順序為(나)→(가)→(다)→(라)。正解：②"}},{"id":14,"section":"13~15","instruction":"다음을 순서에 맞게 배열한 것을 고르십시오. (각 2점)","passage":null,"question":"다음 (가)~(라)를 순서에 맞게 배열한 것을 고르십시오.\n\n(가) 그런데 전화를 끊고 뒤늦게 미안한 마음이 들었다.\n(나) 친구는 나의 합격 소식을 듣고 자신의 일처럼 기뻐했다.\n(다) 얼마 전 나는 회사 합격 소식을 듣고 친한 친구에게 전화했다.\n(라) 아직 취업 못 한 친구를 내가 배려하지 못했다는 생각 때문이었다.","options":["(나) – (다) – (라) – (가)","(나) – (라) – (가) – (다)","(다) – (나) – (가) – (라)","(다) – (나) – (라) – (가)"],"answer":3,"explanation":{"ko":"(다)로 사건 시작→(나)로 친구 반응→(가) '그런데'로 반전→(라)로 미안함의 이유 설명. 따라서 (다)→(나)→(가)→(라) 순서가 맞습니다.","zh":"(다)引出事件起點→(나)描述朋友的反應→(가)以「그런데（然而）」轉折→(라)解釋抱歉的原因。正確順序為(다)→(나)→(가)→(라)。正解：③"}},{"id":15,"section":"13~15","instruction":"다음을 순서에 맞게 배열한 것을 고르십시오. (각 2점)","passage":null,"question":"다음 (가)~(라)를 순서에 맞게 배열한 것을 고르십시오.\n\n(가) 빵이나 고기를 구울 때 갈색으로 바뀌는 것이 그 예이다.\n(나) 갈색으로 바뀌면서 빵이나 고기의 맛도 더 깊어지고 풍부해진다.\n(다) 식품에 들어 있는 당과 단백질이 열을 만나면 색깔이 바뀌게 된다.\n(라) 만약 열이 너무 가해져서 검게 타게 되면 그런 맛을 낼 수가 없다.","options":["(가) – (나) – (라) – (다)","(다) – (가) – (나) – (라)","(가) – (다) – (라) – (나)","(다) – (라) – (나) – (가)"],"answer":2,"explanation":{"ko":"(다)로 일반 원리→(가)로 구체 사례('그 예이다')→(나)로 긍정적 결과→(라)로 예외 조건 제시. 따라서 (다)→(가)→(나)→(라) 순서가 자연스럽습니다.","zh":"(다)提出一般原理→(가)以「그 예이다」引入具體例子→(나)說明正面效果→(라)提出例外條件。正確順序為(다)→(가)→(나)→(라)。正解：②"}},{"id":16,"section":"16~18","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"타조는 멀리서 적이 다가와도 머리를 모래에 파묻고 있다. 그래서 위험이나 위기를 모르는 척 피하는 사람을 타조에 비유하곤 한다. 그런데 사실 타조는 （？） 위해 이런 행동을 한다. 시각보다 청각이 발달한 타조는 땅에서 올리는 발소리를 듣고 적이 오는지를 파악하려는 것이다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["적의 움직임을 알기","먹이를 빨리 구하기","머리를 깨끗이 씻기","다른 타조를 공격하기"],"answer":1,"explanation":{"ko":"빈칸 앞의 '그런데 사실 타조는'은 통념을 뒤집는 역접 표현입니다. 빈칸 뒤에서 '발소리를 듣고 적이 오는지를 파악하려는 것이다'라고 이유를 설명합니다. 따라서 '적의 움직임을 알기' 위한 것입니다.","zh":"空格前「그런데 사실 타조는（然而事實上鴕鳥）」是轉折表達，打破刻板印象。空格後說明：「聆聽地面傳來的腳步聲，判斷敵人是否正在靠近」。因此真正目的是感知敵人的動向。正解：①"}},{"id":17,"section":"16~18","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"섬유 유연제는 섬유에 막을 씌워 옷감을 부드럽게 하고 향기도 남긴다. 그래서 세탁할 때 유연제를 넣는 사람들이 많다. 그런데 수건처럼 물기를 빠르게 흡수해야 하는 소재에는 유연제를 넣는 것이 좋은 것만은 아니다. 유연제가 만든 막이 오히려 섬유의 （？） 때문이다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["향기를 없애기","색깔을 변형시키기","흡수력을 떨어뜨리기","촉감을 거칠게 만들기"],"answer":3,"explanation":{"ko":"수건처럼 물기를 빠르게 흡수해야 하는 소재에는 유연제를 넣는 것이 좋지 않다고 했습니다. 유연제가 만든 막이 수분 흡수를 방해하는 것이 문제이므로 '흡수력을 떨어뜨리기' 때문입니다.","zh":"文中說對於需要快速吸水的材質（如毛巾），加入柔順劑並不一定是好事。柔順劑形成的膜阻礙吸收水分，因此填入「降低吸水力（흡수력을 떨어뜨리기）」。正解：③"}},{"id":18,"section":"16~18","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"디지털 기기에 대한 의존도가 높아지면서 사람들이 무언가 직접 기억해야 할 일은 줄었다. 그래서 이전보다 （？） 생각할 수 있다. 그런데 뇌를 사용하는 방식이 이전과 달라졌을 뿐 사용량이 줄어든 것이 아니다. 과거에는 단순히 정보를 기억하는 데 뇌를 썼다면 이제는 과거보다 압도적으로 많아진 정보를 처리하는 데 사용하고 있는 것이다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["뇌를 덜 사용한다고","기억력이 좋아졌다고","저장해야 할 정보가 많다고","디지털 기기를 많이 쓴다고"],"answer":1,"explanation":{"ko":"빈칸 뒤의 '그런데'는 역접 접속어로, '뇌를 사용하는 방식이 달라졌을 뿐 사용량이 줄어든 것이 아니다'라고 반박합니다. 따라서 빈칸에는 '뇌 사용량이 줄었다'는 내용, 즉 '뇌를 덜 사용한다고'가 들어가야 합니다.","zh":"空格後的「그런데（然而）」是轉折連詞，後文「大腦的使用方式改變了，但使用量並沒有減少」是對空格內容的反駁。因此空格填入「認為比以前更少使用大腦（뇌를 덜 사용한다고）」。正解：①"}},{"id":19,"section":"19~20","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[19,20],"passage":"매서운 남극의 겨울, 황제펭귄들은 겹겹이 붙어 서로의 체온으로 추위를 견딘다. 무리 전체가 돌면서 바깥쪽과 안쪽에 있는 펭귄들이 계속 서로의 위치를 바꾼다. 안에서 몸을 데운 펭귄은 밖으로 나가고 밖에서 추위에 떨던 펭귄은 안으로 들어오는 것이다. （？） 그 움직임은 아주 느리지만 쉬지 않고 이루어져 한 마리의 펭귄이 줄곧 찬바람을 맞고 서 있는 일이 없다. 그렇게 쉼 없이 둥글게 돌면서 펭귄들은 다 함께 살아남는다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["혹시","또는","비록","만약"],"answer":3,"explanation":{"ko":"빈칸 뒤에서 '움직임이 아주 느리지만 쉬지 않고 이루어진다'고 합니다. '느리지만'이라는 양보의 의미가 있으므로, 빈칸에는 양보·대조의 접속부사 '비록'이 가장 자연스럽습니다. '비록 ~지만'의 구조로 완성됩니다.","zh":"空格後說「那個動作雖然非常緩慢，但不停地進行著」。後句已有「느리지만（雖然緩慢）」的讓步表達，因此空格需要填入表示讓步對比的副詞「비록（雖然）」。正解：③"}},{"id":20,"section":"19~20","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[19,20],"passage":"매서운 남극의 겨울, 황제펭귄들은 겹겹이 붙어 서로의 체온으로 추위를 견딘다. 무리 전체가 돌면서 바깥쪽과 안쪽에 있는 펭귄들이 계속 서로의 위치를 바꾼다. 안에서 몸을 데운 펭귄은 밖으로 나가고 밖에서 추위에 떨던 펭귄은 안으로 들어오는 것이다. （？） 그 움직임은 아주 느리지만 쉬지 않고 이루어져 한 마리의 펭귄이 줄곧 찬바람을 맞고 서 있는 일이 없다. 그렇게 쉼 없이 둥글게 돌면서 펭귄들은 다 함께 살아남는다.","question":"윗글의 주제로 가장 알맞은 것을 고르십시오.","options":["황제펭귄은 서로 도우면서 추위에 맞서 생존해 왔다.","황제펭귄은 둥글게 돌면서 날씨에 대한 정보를 알린다.","황제펭귄은 추위에서 살아남기 위해 움직임이 느려졌다.","황제펭귄은 무리 생활을 통해 경쟁에서 이기는 법을 배운다."],"answer":1,"explanation":{"ko":"이 글의 핵심은 황제펭귄들이 서로의 체온을 나누고 위치를 교대하며 '함께 살아남는다'는 것입니다. ②날씨 정보, ③움직임 둔화, ④경쟁은 본문에 없습니다.","zh":"本文的核心是帝企鵝們互相分享體溫，不停地交換內外位置，「一起存活下來」。②③④的內容在本文中均未提及。正解：①"}},{"id":21,"section":"21~22","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[21,22],"passage":"최근 미술 전시회 수요가 증가하면서 돈벌이에 급급한 전시회가 늘고 있다. 일부 전시 관계자들이 전시 포스터 등 홍보 자료에 복제품 전시임을 밝히지 않고 입장료 수입만 챙기는 것이다. 전시장을 찾아와서야 이런 사실을 알게 된 관람객들은 불만을 쏟아 내고 있다. 전문가들은 이런 전시 행태가 미술계 발전의 （？） 수 있다고 우려한다. 전시회에 실망한 사람들이 미술에 대한 관심을 아예 끊을 수 있기 때문이다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["입맛에 맞을","가슴을 울릴","발목을 잡을","손을 맞잡을"],"answer":3,"explanation":{"ko":"'발목을 잡다'는 '어떤 일의 진행을 방해하다'라는 관용 표현입니다. 미술계 발전을 저해할 수 있다는 맥락에 가장 어울립니다.","zh":"「발목을 잡다」是慣用表達，意為「妨礙或阻礙某事的進行（拖後腿）」。後文說明這種行為會阻礙美術界的發展，因此最為恰當。正解：③"}},{"id":22,"section":"21~22","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[21,22],"passage":"최근 미술 전시회 수요가 증가하면서 돈벌이에 급급한 전시회가 늘고 있다. 일부 전시 관계자들이 전시 포스터 등 홍보 자료에 복제품 전시임을 밝히지 않고 입장료 수입만 챙기는 것이다. 전시장을 찾아와서야 이런 사실을 알게 된 관람객들은 불만을 쏟아 내고 있다. 전문가들은 이런 전시 행태가 미술계 발전의 （？） 수 있다고 우려한다. 전시회에 실망한 사람들이 미술에 대한 관심을 아예 끊을 수 있기 때문이다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["복제품 전시회는 입장료를 받지 않는다.","최근 미술 전시회를 찾는 사람들이 많지 않다.","전시회에서 복제품을 전시하는 일이 점점 줄고 있다.","복제품 전시회인지 모르고 전시회를 방문한 관람객들이 있다."],"answer":4,"explanation":{"ko":"①복제품 전시회도 입장료를 받습니다. ②수요가 증가한다고 했습니다. ③복제품 전시가 늘고 있다고 했습니다. ④홍보 자료에 밝히지 않아 전시장에서야 알게 된 관람객들이 있다는 내용과 일치합니다.","zh":"①複製品展覽也有收取入場費。②文中說需求增加。③複製品展覽正在增加。④未在宣傳資料中說明，觀覽者到場才知道，與選項④吻合。正解：④"}},{"id":23,"section":"23~24","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[23,24],"passage":"꽃집을 지나다가 꽃말에 이끌려 금잔화 꽃씨를 샀다. 화분에 심어 사무실의 내 책상 위에 두었더니 어느 날 싹이 텄다. 때맞춰 물도 주며 나는 수시로 들여다보았다. 신기했다. 작고 여린 싹은 눈에 띄게 쑥쑥 자랐다. 그런데 내가 상상한 모습이 아니었다. <u>도대체 여기서 어떻게 꽃이 핀다는 건지.</u> 무순처럼 길쭉하게 위로만 자라는 것이었다. 하루는 출근해 보니 금잔화가 쓰러져 있었다. 그럼 그렇지. 내가 무슨 식물을 키우나. 그날 나는 화분을 창가로 옮겨 놓았다. 죽을 것 같은 모습을 눈앞에서 보고 싶지 않았다. 그런데 어느 날부턴가 점점 줄기가 굵어지더니 잎도 제법 풍성해지기 시작했다. 어느 날에는 꽃망울도 올라와 있었다. 금잔화는 창문으로 들어오는 풍성한 햇볕 속에서 스스로 튼튼해졌다. 금잔화에게는 햇빛이 더 많이 필요했었나 보다. 사람도 식물도 사랑하려면 그 대상을 제대로 알아야 하는 건 똑같구나 싶었다. 씩씩하게 꽃피운 금잔화의 꽃말은 '반드시 올 행복'이다.","question":"밑줄 친 부분에 나타난 '나'의 심정으로 가장 알맞은 것을 고르십시오.","options":["의심스럽다","고통스럽다","조심스럽다","부담스럽다"],"answer":1,"explanation":{"ko":"밑줄 친 '도대체 여기서 어떻게 꽃이 핀다는 건지'는 자신이 상상한 모습과 달리 위로만 자라는 것을 보고 꽃이 필 수 있을지 의아해하는 심정입니다. '도대체'라는 표현이 강한 의구심을 드러냅니다.","zh":"底線部分「到底在這裡怎麼可能開花呢」，是看到芽苗與想象中不同只是細長地往上長時，對能否正常開花感到懷疑的心情。「도대체（到底）」強烈顯示出疑惑感。正解：①"}},{"id":24,"section":"23~24","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[23,24],"passage":"꽃집을 지나다가 꽃말에 이끌려 금잔화 꽃씨를 샀다. 화분에 심어 사무실의 내 책상 위에 두었더니 어느 날 싹이 텄다. 때맞춰 물도 주며 나는 수시로 들여다보았다. 신기했다. 작고 여린 싹은 눈에 띄게 쑥쑥 자랐다. 그런데 내가 상상한 모습이 아니었다. <u>도대체 여기서 어떻게 꽃이 핀다는 건지.</u> 무순처럼 길쭉하게 위로만 자라는 것이었다. 하루는 출근해 보니 금잔화가 쓰러져 있었다. 그럼 그렇지. 내가 무슨 식물을 키우나. 그날 나는 화분을 창가로 옮겨 놓았다. 죽을 것 같은 모습을 눈앞에서 보고 싶지 않았다. 그런데 어느 날부턴가 점점 줄기가 굵어지더니 잎도 제법 풍성해지기 시작했다. 어느 날에는 꽃망울도 올라와 있었다. 금잔화는 창문으로 들어오는 풍성한 햇볕 속에서 스스로 튼튼해졌다. 금잔화에게는 햇빛이 더 많이 필요했었나 보다. 사람도 식물도 사랑하려면 그 대상을 제대로 알아야 하는 건 똑같구나 싶었다. 씩씩하게 꽃피운 금잔화의 꽃말은 '반드시 올 행복'이다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["내 책상 위에 둔 금잔화는 금방 말라 죽었다.","나는 금잔화 화분에 물을 제대로 주지 못했다.","나는 꽃집에서 금잔화가 피어 있는 화분을 샀다.","내가 금잔화 화분을 옮긴 곳은 햇볕이 잘 들었다."],"answer":4,"explanation":{"ko":"①금잔화는 쓰러지기는 했지만 결국 꽃을 피웠습니다. ②때맞춰 물을 주었습니다. ③꽃씨를 샀습니다. ④화분을 창가로 옮겼고 '창문으로 들어오는 풍성한 햇볕 속에서 스스로 튼튼해졌다'고 했습니다.","zh":"①金盞花雖然倒下過，但最終開了花。②文中說「適時澆水」。③買的是花種。④把花盆移到窗邊後，文中說「在充足陽光中自己變得強壯」，可見移去的地方陽光充足。正解：④"}},{"id":25,"section":"25~27","instruction":"다음 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오. (각 2점)","passage":"가수 진영, 3년 만의 콘서트에 구름 관중","question":"위 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오.","options":["가수 진영이 3년 만에 콘서트를 열자 수많은 관중이 몰렸다.","가수 진영이 3년 내에 다시 콘서트를 열기로 관중에게 약속했다.","가수 진영이 3년간 준비한 콘서트를 열었으나 관중의 호응이 적었다.","가수 진영이 3년 만에 하는 콘서트에 많은 관중을 모으려고 홍보했다."],"answer":1,"explanation":{"ko":"'3년 만의'는 3년 만에 처음으로 열리는 것을, '구름 관중'은 수많은 관중이 모였다는 관용 표현입니다. ①이 제목을 가장 정확하게 설명합니다.","zh":"「3년 만의」意為「時隔3年首次」。「구름 관중」是慣用表達，意為「如雲般聚集的大批觀眾」。①最準確說明了標題。正解：①"}},{"id":26,"section":"25~27","instruction":"다음 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오. (각 2점)","passage":"한국 탁구의 간판 김수미, 올해 국제 대회 금메달 싹쓸이","question":"위 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오.","options":["올해 국제 탁구 대회에서 한국 대표 김수미의 금메달 가능성이 높아졌다.","한국 탁구계가 김수미를 내세워 올해 국제 대회의 금메달을 노리고 있다.","한국의 대표 탁구 선수 김수미가 올해 국제 대회에서 모두 금메달을 땄다.","한국 탁구 선수 김수미가 올해 국제 대회에서 금메달을 따고자 훈련 중이다."],"answer":3,"explanation":{"ko":"'간판'은 대표하는 사람, '싹쓸이'는 모조리 차지했다는 의미입니다. 이미 완료된 사실을 나타내므로 ③이 정답입니다.","zh":"「간판」意為代表某領域的人。「싹쓸이」意為「全部包攬」。描述已完成的事實，因此③正確。正解：③"}},{"id":27,"section":"25~27","instruction":"다음 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오. (각 2점)","passage":"대출 금리 하락세, 부동산 시장 기지개","question":"위 신문 기사의 제목을 가장 잘 설명한 것을 고르십시오.","options":["대출 금리가 떨어지면서 부동산 시장이 살아나기 시작했다.","부동산 시장에 대한 규제가 대출 금리 하락에 영향을 미쳤다.","대출 금리가 하락했지만 부동산 시장의 거래는 줄어들고 있다.","부동산 시장을 활성화하려고 대출 금리 안정화 대책이 논의되고 있다."],"answer":1,"explanation":{"ko":"'하락세'는 계속 떨어지는 추세, '기지개'는 활기를 되찾기 시작한다는 관용 표현입니다. ①이 이 내용을 정확히 설명합니다.","zh":"「하락세」意為持續下跌的趨勢。「기지개」意為「像伸懶腰一樣開始恢復活力」。①正確說明了這個意思。正解：①"}},{"id":28,"section":"28~31","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"선글라스는 보통 햇빛이 강할 때 눈 건강을 위해 쓴다. 그런데 선글라스의 렌즈는 사용 기한이 있다. 선글라스의 렌즈에는 자외선 차단을 위한 얇은 막이 입혀져 있는데 열에 계속 노출되면 자외선 차단 기능이 점점 떨어지게 된다. 자외선 차단 기능이 약해진 선글라스로는 눈을 보호하기 어려우므로 5년 정도 쓰고 나면 （？） 것이 좋다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["렌즈를 바꿔 주는","렌즈를 꼼꼼히 잘 닦는","렌즈의 색을 어둡게 하는","렌즈의 얇은 막을 벗겨 내는"],"answer":1,"explanation":{"ko":"자외선 차단 기능이 약해진 선글라스는 기능이 회복될 수 없으므로 '렌즈를 바꿔 주는' 것이 가장 논리적인 해결책입니다.","zh":"防紫外線功能減弱後無法恢復，因此使用約5年後最合理的解決方法是「換鏡片（렌즈를 바꿔 주는）」。正解：①"}},{"id":29,"section":"28~31","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"사진에서 구도는 전체적인 분위기를 살리는 중요한 요소이다. 보통 동적인 느낌을 주고 싶을 때는 대각선 구도를 쓰는데 도로나 폭포 등의 풍경 사진 등에 쓰여 생동감을 표현한다. 한편 전통적인 가족사진은 （？） 위해서 삼각형 구도를 가장 많이 활용한다. 이 구도는 연장자를 중심으로 가족 구성원이 옆이나 뒤에 배치되어 전체적으로 편안하고 균형 잡힌 분위기를 만들어 낸다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["동적인 효과를 살리기","안정적인 느낌을 주기","풍경을 중앙에 배치하기","긴장된 분위기를 연출하기"],"answer":2,"explanation":{"ko":"삼각형 구도는 '편안하고 균형 잡힌 분위기'를 만들어 냅니다. '한편'이라는 대조 표현 뒤에 가족사진이 나오므로 동적인 것과 반대되는 '안정적인 느낌을 주기' 위한 것입니다.","zh":"三角形構圖「營造出整體舒適且均衡的氛圍」。「한편（另一方面）」後出現的傳統家庭照，目的是帶來與「動感」相反的「안정적인 느낌（穩定感）」。正解：②"}},{"id":30,"section":"28~31","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"풍부한 자원은 경제 성장의 필요조건이지 충분조건은 아니다. 풍부한 천연자원을 갖추고 있음에도 （？） 경우도 있다. 풍부한 자원에만 의존해 경제 성장의 중심 산업인 제조업이나 서비스업 등에 투자를 하지 않게 되는 것이다. 반면에 천연자원이 빈약해도 새로운 기술 개발이나 교육을 통해 생산 능력을 높이는 나라도 있다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["제조업에 의존하려는","자원을 생산하지 못하는","경제 발전을 이루지 못하는","기술 개발에 무리하게 투자하는"],"answer":3,"explanation":{"ko":"'풍부한 자원은 경제 성장의 충분조건이 아니다'라고 했고, 자원에만 의존해 제조업 등에 투자하지 않는 것이 문제라고 설명합니다. 따라서 '경제 발전을 이루지 못하는'이 가장 자연스럽습니다.","zh":"「豐富的資源是經濟成長的必要條件，但不是充分條件」，只依賴豐富資源而不投資製造業或服務業是問題所在。因此填入「即使資源豐富也無法實現經濟發展（경제 발전을 이루지 못하는）」。正解：③"}},{"id":31,"section":"28~31","instruction":"( )에 들어갈 말로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"의사의 모습을 생각하면 우리는 보통 흰색 가운을 떠올리게 된다. 그런데 의사 가운이 처음부터 흰색이었던 것은 아니다. 중세 시대에는 성직자가 의사를 겸하는 경우가 많아 성직자용 검은색 가운을 입고 진료를 했다. 그런데 검은색 옷은 세균으로 오염된 얼룩이 잘 보이지 않았다. 이후 세균 감염의 위험성에 대한 인식이 높아지면서 （？） 가운의 색이 흰색으로 바뀌었다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["염색하기 편하게","환자와 구분이 되도록","오염이 쉽게 눈에 띄도록","밝은 이미지를 줄 수 있게"],"answer":3,"explanation":{"ko":"검은색 옷의 문제점은 세균으로 오염된 얼룩이 잘 보이지 않는 것이었습니다. 이를 해결하기 위해 '오염이 쉽게 눈에 띄도록' 흰색으로 바꿨습니다.","zh":"黑色衣服的問題是被細菌污染的污漬不容易看見。為了解決此問題，改為白色以「讓污染容易被看見（오염이 쉽게 눈에 띄도록）」。正解：③"}},{"id":32,"section":"32~34","instruction":"다음을 읽고 글의 내용과 같은 것을 고르십시오. (각 2점)","passage":"당뇨 환자들을 위해 고추 품종인 '살리초'가 개발되었다. 고추는 보통 열매를 얻기 위해 재배하지만 살리초는 열매가 없고 잎을 먹는 품종이다. 일반 고추에 비해 혈당을 낮추는 성분이 10배 이상 많이 함유돼 있어 당뇨병, 비만증 등 성인병의 예방과 치료에 이용될 수 있다. 또한 살리초에는 칼슘, 비타민 등 각종 영양 성분이 풍부하다. 병해충에도 강하고 생육 기간도 짧아서 농가의 고소득 작물로 주목받고 있다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["살리초는 해충에 취약하다는 단점이 있다.","살리초의 열매는 크고 영양 성분이 풍부하다.","살리초는 생육 기간이 길어 관심을 받지 못하고 있다.","살리초의 잎에는 혈당을 떨어뜨리는 성분이 들어 있다."],"answer":4,"explanation":{"ko":"①병해충에 강합니다. ②열매가 없는 품종입니다. ③생육 기간이 짧아서 주목받고 있습니다. ④일반 고추에 비해 혈당을 낮추는 성분이 10배 이상 함유되어 있으므로 맞습니다.","zh":"①文中說「對病蟲害也很強」。②살리초是沒有果實的品種。③文中說「生育期短，備受關注」。④含有10倍以上降低血糖的成分，說法正確。正解：④"}},{"id":33,"section":"32~34","instruction":"다음을 읽고 글의 내용과 같은 것을 고르십시오. (각 2점)","passage":"『임원경제지』는 조선 시대 서유구가 쓴 백과사전이다. 선비가 시골에서 살아가는 데 필요한 지식을 탐색한 것으로 농업, 건축, 의학 등 16개 분야를 정리했다. 서유구는 이 책을 쓸 때 조선의 생활상을 직접 관찰하고 여러 서적들을 참고했으며 거기에 자신의 논평을 첨부했다. 이 과정에서 인용한 책들을 밝혀 놓아 서지학적 가치도 크다. 총 52권의 책을 편찬했는데 개인이 완성했다고 보기 어려울 만큼 방대하고 전문적인 지식이 담겨 있다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["이 책은 각 분야의 전문가가 모여 만든 책이다.","서유구는 집필하면서 참고한 문헌을 이 책에 기록해 놓았다.","서유구는 객관적인 책을 쓰기 위해 자신의 의견은 배제했다.","이 책은 내용이 특정 분야에 한정되어 서지학적 가치는 크지 않다."],"answer":2,"explanation":{"ko":"①개인이 편찬했습니다. ②인용한 책들을 밝혀 놓았으므로 맞습니다. ③자신의 논평을 첨부했습니다. ④16개 분야를 다루고 서지학적 가치도 큽니다.","zh":"①由個人編纂。②標明了引用的書籍，說法正確。③附上了自己的評論。④涵蓋16個領域，書誌學價值也很大。正解：②"}},{"id":34,"section":"32~34","instruction":"다음을 읽고 글의 내용과 같은 것을 고르십시오. (각 2점)","passage":"코알라는 유칼립투스라는 나뭇잎을 먹고 산다. 이 나뭇잎은 독성이 강해서 일반적인 동물들은 먹을 수 없다. 하지만 코알라는 유칼립투스의 독을 해독하는 효소가 있어서 다른 동물들과 경쟁할 필요 없이 유칼립투스 잎을 충분히 먹을 수 있다. 다만 새끼 코알라는 독성을 분해하는 효소가 없어서 유칼립투스 잎 대신 어미의 배설물을 먹는다. 이를 먹다 보면 새끼 코알라의 몸속에도 유칼립투스의 독을 해독하는 효소가 생기게 된다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["다양한 동물들이 유칼립투스 잎을 차지하기 위해 경쟁한다.","어미 코알라는 유칼립투스의 독성을 분해하는 효소를 가지고 있다.","코알라는 태어난 직후부터 많은 양의 유칼립투스 나뭇잎을 먹는다.","새끼 코알라는 유칼립투스의 독성 때문에 어미의 배설물을 먹지 않는다."],"answer":2,"explanation":{"ko":"①코알라는 다른 동물들과 경쟁할 필요가 없습니다. ②코알라는 유칼립투스의 독을 해독하는 효소가 있으므로 맞습니다. ③새끼 코알라는 태어난 직후에는 유칼립투스 잎을 먹지 못합니다. ④새끼는 효소가 없어서 어미의 배설물을 먹습니다.","zh":"①코알라不需要與其他動物競爭。②코알라有解毒酵素，說法正確。③小코알라出生後不能吃유칼립투스葉。④小코알라因為沒有酵素，所以吃母親的排泄物。正解：②"}},{"id":35,"section":"35~38","instruction":"다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"태양계에 존재하는 수많은 소행성에는 천문학적인 가치를 지닌 광물이 있는 것으로 예상된다. 그래서 많은 나라들이 이에 관심을 가지고 있다. 실제로 최근 몇몇 국가에서는 소행성에 있는 광물 시료를 채취하는 데 성공하기도 했다. 하지만 대부분의 나라들에서는 소행성 탐사가 아직 논의 단계에 머무르고 있다. 미래 자원을 확보하기 위해서 적극적으로 소행성 탐사에 대한 투자와 기술 개발에 나설 필요가 있다.","question":"윗글의 주제로 가장 알맞은 것을 고르십시오.","options":["태양계에는 아직 발견되지 않은 소행성이 많이 존재한다.","소행성에서 자원을 가져오는 것은 실현 가능성이 희박하다.","소행성 탐사를 성공시키기 위해 국제 협력을 확대해야 한다.","미래 자원 확보를 위해 소행성 탐사에 대한 노력을 기울여야 한다."],"answer":4,"explanation":{"ko":"마지막 문장 '미래 자원을 확보하기 위해서 적극적으로 소행성 탐사에 대한 투자와 기술 개발에 나설 필요가 있다'가 글 전체의 주제입니다.","zh":"文章最後一句「為了確保未來資源，有必要積極投入小行星探測的投資與技術開發」明確點出全文主題。正解：④"}},{"id":36,"section":"35~38","instruction":"다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"경기 침체에 빠지면 사람들은 소비보다는 저축을 늘리려고 한다. 그런데 저축이 언제나 긍정적인 것만은 아니다. 소비가 줄면 기업의 매출이 감소해서 생산과 고용이 줄 수밖에 없고 결국 근로자들의 소득도 줄어들게 된다. 그러면 미래가 불확실해진 사람들이 더욱 소비를 줄여 전체 경기가 다시 침체에 빠지는 악순환이 되풀이된다. 개인 차원에서는 저축이 합리적인 행동이지만 경제 전체적으로는 비합리적인 상황을 초래하게 되는 것이다.","question":"윗글의 주제로 가장 알맞은 것을 고르십시오.","options":["불경기에는 비합리적인 소비로 인해 근로자들의 저축이 줄어든다.","경기가 침체하면 개인의 소득이 줄어들지 않도록 투자를 늘려야 한다.","경제 상황을 고려해서 생산과 고용을 적절히 조절하는 것이 중요하다.","경기 침체 시에는 저축이 국가 경제 전체에 부정적 영향을 줄 수 있다."],"answer":4,"explanation":{"ko":"'개인 차원에서는 저축이 합리적이지만 경제 전체적으로는 비합리적인 상황을 초래한다'는 것이 주제입니다. 즉 경기 침체 시 개인의 저축 증가가 경제 전체에 악영향을 줄 수 있습니다.","zh":"「在個人層面儲蓄是合理行為，但在整體經濟層面卻會導致不合理的狀況」是主題。即經濟蕭條時個人增加儲蓄可能對整體經濟產生負面影響。正解：④"}},{"id":37,"section":"35~38","instruction":"다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"참치 쿼터제는 참치의 무분별한 포획을 막기 위해 어획량을 국가별로 정해 놓은 제도이다. 한국은 참치 어획량이 매우 적게 배정돼 있는데 이는 한국 연안에서는 참치가 거의 잡히지 않았기 때문이다. 최근 수온이 상승함에 따라 한국 연안에 유입되는 참치가 급격히 늘어나고 있지만 쿼터제 때문에 그물에 걸린 참치를 대부분 바다에 버리고 있다. 쿼터제의 필요성은 인정하지만 국가별 개체 수 증감을 반영한 융통성 있는 조정이 필요하다.","question":"윗글의 주제로 가장 알맞은 것을 고르십시오.","options":["국가별 상황에 따라 참치 쿼터제를 현실에 맞게 수정해야 한다.","참치의 무분별한 포획을 방지하기 위해 쿼터제를 도입해야 한다.","수온 상승으로부터 참치를 보호하기 위한 대책을 마련해야 한다.","참치의 유입량을 늘리기 위한 실질적인 연구가 이루어져야 한다."],"answer":1,"explanation":{"ko":"'국가별 개체 수 증감을 반영한 융통성 있는 조정이 필요하다'가 주제를 직접 나타냅니다. 각 나라의 현실에 맞게 유연하게 조정해야 한다는 것입니다.","zh":"「需要反映各國個體數增減的靈活調整」直接點出主題。雖然承認配額制度的必要性，但應根據各國實際情況靈活調整。正解：①"}},{"id":38,"section":"35~38","instruction":"다음을 읽고 글의 주제로 가장 알맞은 것을 고르십시오. (각 2점)","passage":"기업들은 기술 혁신을 통해 고객에게 편의와 혜택을 제공하려고 한다. 하지만 아무리 획기적인 혁신이라도 고객에게 낯설고 커다란 행동 변화를 요구한다면 외면당하기 쉽다. 예를 들어 초창기 전기 자동차는 전기로 오래 충전을 해야 하는 것이 낯설고 불편해서 큰 관심을 끌지 못했다. 반대로 전자 칠판과 전자 펜처럼 대단한 혁신은 아니지만 사용하는 방법이 고객에게 익숙하고 간단해서 환영받는 경우도 있다.","question":"윗글의 주제로 가장 알맞은 것을 고르십시오.","options":["고객들의 무리한 요구 때문에 기술 혁신에 어려움을 겪게 된다.","혁신적인 기업은 고객들에게 신기술의 사용 방법을 잘 설명해 준다.","기술 혁신에 실패한 기업은 자연스럽게 고객들의 외면을 받게 된다.","기술 혁신은 고객이 쉽게 받아들일 수 있을 때 성공할 가능성이 높다."],"answer":4,"explanation":{"ko":"아무리 혁신적이어도 낯설면 외면받고, 익숙하고 간단하면 환영받는다는 것이 핵심입니다. 기술 혁신이 성공하려면 고객이 쉽게 받아들일 수 있어야 한다는 것이 주제입니다.","zh":"無論多麼革新，如果讓顧客感到陌生就會被外面；熟悉且簡單的則受到歡迎。技術革新要成功，必須讓顧客容易接受，這才是主題。正解：④"}},{"id":39,"section":"39~41","instruction":"주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오. (각 2점)","given_sentence":"그런데 심판이 아무리 위치 선정을 잘해도 필연적으로 선수의 몸에 가려서 볼 수 없는 사각지대가 생긴다.","passage":"스포츠 경기를 진행할 때 득점이나 반칙 등의 판정은 심판에 의해서 이루어진다. ( ㉠ ) 이렇게 눈에 보이지 않는 곳에서 벌어진 상황에 대해서는 심판도 정확한 판단을 하기 어렵다. ( ㉡ ) 비디오 판독은 이런 스포츠 경기에서 초고속 카메라를 판정의 근거로 사용하는 기술이다. ( ㉢ ) 이처럼 비디오 판독을 활용하면 심판이 판단하기 어려운 부분을 객관적으로 확인할 수 있어 판정에 대한 신뢰도를 높일 수 있다. ( ㉣ )","question":"주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오.","options":["㉠","㉡","㉢","㉣"],"answer":1,"explanation":{"ko":"주어진 문장은 '그런데'로 시작하는 역접 문장으로 사각지대가 생긴다는 내용입니다. ㉠ 앞 문장은 일반적 사실이고, ㉠ 뒤 문장은 '이렇게 눈에 보이지 않는 곳'이라는 표현이 주어진 문장의 '사각지대'를 자연스럽게 받습니다.","zh":"주어진 文章以「그런데（然而）」開頭，說明會出現盲區。㉠前句是一般事實，㉠後句的「이렇게 눈에 보이지 않는 곳（這樣看不見的地方）」自然承接주어진 文章中的「사각지대（盲區）」。正解：①㉠"}},{"id":40,"section":"39~41","instruction":"주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오. (각 2점)","given_sentence":"그 증거로 지중해 전역에서 발견되고 있는 소금 퇴적층을 들 수 있다.","passage":"유럽과 아시아, 아프리카 대륙으로 둘러싸인 바다를 지중해라고 한다. ( ㉠ ) 오늘날 지중해 연안은 기후가 온화해서 살기 좋은 곳으로 손꼽힌다. ( ㉡ ) 그런데 지중해는 오래전 사막이었던 적이 있었다. ( ㉢ ) 이 소금 퇴적층은 바닷물이 증발되고 남은 소금이 쌓여 만들어진 것으로 지중해가 이전에는 사막이었음을 보여 준다. ( ㉣ ) 사막이었던 지중해에 이후 큰 홍수가 발생하면서 다시 오늘날과 같은 바다가 되었다.","question":"주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오.","options":["㉠","㉡","㉢","㉣"],"answer":3,"explanation":{"ko":"'그 증거로 소금 퇴적층을 들 수 있다'는 앞에 증거가 필요한 주장이 있어야 합니다. ㉢ 앞 문장 '지중해는 오래전 사막이었던 적이 있었다'가 그 주장이고, ㉢ 뒤 문장 '이 소금 퇴적층은…'이 '이'로 자연스럽게 받습니다.","zh":"「可以舉出地中海全域發現的鹽沉積層」前面必須有需要證據的主張。㉢前句「地中海在很久以前曾是沙漠」是該主張，㉢後句以「이」自然承接주어진 文章中的鹽沉積層。正解：③㉢"}},{"id":41,"section":"39~41","instruction":"주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오. (각 2점)","given_sentence":"이런 상소문들을 저자는 왕을 향한 깨우침의 죽비 소리로 비유하고 있다.","passage":"최근 역사학자 김경민 씨가 『응답하라, 조선』을 펴냈다. ( ㉠ ) 이 책은 왕과 신하의 소통을 다루고 있어 사람들의 관심을 끈다. ( ㉡ ) 그 소통의 내용 중에서 특히 왕의 노여움을 무릅쓰고 신하가 왕의 잘못을 지적한 상소문을 다룬 부분이 주목받고 있다. ( ㉢ ) 『응답하라, 조선』은 눈치를 살피며 윗사람의 잘못을 모르는 체 넘기곤 하는 현대인들을 깨우는 죽비인 것이다. ( ㉣ )","question":"주어진 문장이 들어갈 곳으로 가장 알맞은 것을 고르십시오.","options":["㉠","㉡","㉢","㉣"],"answer":3,"explanation":{"ko":"'이런 상소문들을 저자는 죽비 소리로 비유한다'는 내용입니다. ㉢ 앞 문장에서 상소문을 구체적으로 설명했고, 주어진 문장의 '이런 상소문들'이 이를 받습니다. ㉢ 뒤 문장에서 '죽비'가 다시 등장해 자연스럽게 연결됩니다.","zh":"「저자（作者）將這些上疏文比喻為喚醒（王）的竹篦聲」。㉢前句具體說明上疏文，주어진 文章的「이런 상소문들」正好承接此內容。㉢後句再次出現「죽비」，前後銜接自然。正解：③㉢"}},{"id":42,"section":"42~43","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[42,43],"passage":"민욱이 주말에 친구 부부를 초대해도 되느냐고 물었을 때, 미연은 말없이 한참 뜸을 들였다. 그녀는 그날 민욱과 함께 아파트의 발코니 벽을 페인트 칠할 계획이었다. (중략) 그들은 육 개월 전에 E시의 아파트를 사서 이사했다. 지은 지 이십 년도 더 된 낡은 아파트였지만, 누구의 도움도 받지 않고 그들 스스로 이룬 일이었다. 미연은 직접 발품을 팔아 수도부터 새시까지 새로 손을 보았다. 하지만 집수리는 대강 되었다고 해도, 미연이 생각해 둔 대로 인테리어가 완성되려면 아직 부족했다.\n<u>\"손님 초대는 좀 이르지 않아? 집 단장도 털 되었는데……\"</u>\n\"성재가 한국에 왔대.\"\n민욱이 무거운 목소리로 말했다. (중략)\n민욱과 성재는 고등학교 동창이고, 그들을 통해 만난 미연과 연주도 십여 년이 넘는 인연이었다. 꽤나 가까운 사이였지만 성재가 사업 실패로 한국을 떠나면서 연락이 끊겼다. 미연은 자신이 연주의 이름을 오랫동안 잊고 있었다는 사실을 깨달았다. 더 이상 뭐라고 할 말이 없었다. (중략)\n토요일 오전에 미연은 두 딸아이를 데리고 마트에 가서 고기와 채소를 샀다. 누군가를 초대해 음식을 대접하는 것이 정말로 오랜만이었다.","question":"밑줄 친 부분에 나타난 '미연'의 심정으로 가장 알맞은 것을 고르십시오.","options":["후련하다","불만스럽다","허전하다","자랑스럽다"],"answer":2,"explanation":{"ko":"밑줄 친 부분은 인테리어가 완성되지 않은 상황에서 갑작스럽게 손님을 초대하려는 민욱에게 내뱉은 말로, 집을 제대로 꾸미기도 전에 손님을 맞이해야 하는 불만과 불편한 심정이 담겨 있습니다.","zh":"底線部分是미연在室內裝潢尚未完成的情況下，對民욱突然要邀請客人時說的話，流露出在家還沒佈置好就要迎客的不滿與不舒服的心情。正解：②"}},{"id":43,"section":"42~43","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[42,43],"passage":"민욱이 주말에 친구 부부를 초대해도 되느냐고 물었을 때, 미연은 말없이 한참 뜸을 들였다. 그녀는 그날 민욱과 함께 아파트의 발코니 벽을 페인트 칠할 계획이었다. (중략) 그들은 육 개월 전에 E시의 아파트를 사서 이사했다. 지은 지 이십 년도 더 된 낡은 아파트였지만, 누구의 도움도 받지 않고 그들 스스로 이룬 일이었다. 미연은 직접 발품을 팔아 수도부터 새시까지 새로 손을 보았다. 하지만 집수리는 대강 되었다고 해도, 미연이 생각해 둔 대로 인테리어가 완성되려면 아직 부족했다.\n<u>\"손님 초대는 좀 이르지 않아? 집 단장도 털 되었는데……\"</u>\n\"성재가 한국에 왔대.\"\n민욱이 무거운 목소리로 말했다. (중략)\n민욱과 성재는 고등학교 동창이고, 그들을 통해 만난 미연과 연주도 십여 년이 넘는 인연이었다. 꽤나 가까운 사이였지만 성재가 사업 실패로 한국을 떠나면서 연락이 끊겼다. 미연은 자신이 연주의 이름을 오랫동안 잊고 있었다는 사실을 깨달았다. 더 이상 뭐라고 할 말이 없었다. (중략)\n토요일 오전에 미연은 두 딸아이를 데리고 마트에 가서 고기와 채소를 샀다. 누군가를 초대해 음식을 대접하는 것이 정말로 오랜만이었다.","question":"윗글의 내용으로 알 수 있는 것을 고르십시오.","options":["미연은 민욱과 성재를 통해 연주를 알게 되었다.","민욱은 주변 도움을 받아 E시의 새 아파트를 샀다.","미연은 육 개월 전에 산 아파트로 이사 갈 계획이다.","민욱은 인테리어를 완성한 후에 마트에 장을 보러 갔다."],"answer":1,"explanation":{"ko":"①'민욱과 성재는 고등학교 동창이고, 그들을 통해 만난 미연과 연주'라고 했으므로 맞습니다. ②누구의 도움도 받지 않았습니다. ③이미 육 개월 전에 이사했습니다. ④마트에 간 것은 미연이며 인테리어는 아직 완성되지 않았습니다.","zh":"①「民욱과 성재是高中同學，미연과 연주是通過他們認識」，說法正確。②文中說沒有受任何人幫助。③已經六個月前搬入，並非計劃搬入。④去超市的是미연，且인테리어尚未完成。正解：①"}},{"id":44,"section":"44~45","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[44,45],"passage":"'수로왕 신화'는 왕이 알에서 탄생하는 여느 건국 신화와 유사하다. 고대에 아직 나라가 없던 낙동강 하류에 황금알 여섯 개가 하늘에서 내려왔다. 그중 맨 먼저 알을 깨고 나온 아이를 '수로'라 하였고 하늘의 뜻에 따라 수로는 지상의 첫 번째 왕이 되었다. （？） 다섯 아이 역시 각각 왕이 되었다. 수로왕 신화는 이렇게 한꺼번에 여섯 개 알이 나타나 거기서 태어난 이가 모두 왕이 된다는 점에서 다른 건국 신화와 큰 차이가 있다. 당시 세워진 여섯 나라는 강력한 왕권 국가가 아니었다. 황금알은 하늘로부터 부여받은 절대적 권위를 상징하는데 수로가 알에서 최초로 탄생했다는 부분은 수로왕이 중심이 되어 여섯 나라를 하나의 강력한 국가 '가야'로 통합하려 했다는 것을 말해 준다.","question":"（？）에 들어갈 말로 가장 알맞은 것을 고르십시오.","options":["알을 가지고 내려온","기존의 왕을 물리치고","수로에 이어 알에서 태어난","탄생을 축하하며 몹시 기뻐하던"],"answer":3,"explanation":{"ko":"빈칸 앞에서 수로가 첫 번째 왕이 되었고, 빈칸 뒤에서 '다섯 아이 역시 각각 왕이 되었다'고 합니다. 나머지 다섯 아이도 알에서 태어났다는 내용인 '수로에 이어 알에서 태어난'이 가장 자연스럽습니다.","zh":"空格前說수로成為第一位王，空格後說「另外五個孩子也各自成為了王」。因此空格需填入其餘五個孩子也是從蛋中誕生的內容，即「繼수로之後從蛋中誕生的」。正解：③"}},{"id":45,"section":"44~45","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[44,45],"passage":"'수로왕 신화'는 왕이 알에서 탄생하는 여느 건국 신화와 유사하다. 고대에 아직 나라가 없던 낙동강 하류에 황금알 여섯 개가 하늘에서 내려왔다. 그중 맨 먼저 알을 깨고 나온 아이를 '수로'라 하였고 하늘의 뜻에 따라 수로는 지상의 첫 번째 왕이 되었다. （？） 다섯 아이 역시 각각 왕이 되었다. 수로왕 신화는 이렇게 한꺼번에 여섯 개 알이 나타나 거기서 태어난 이가 모두 왕이 된다는 점에서 다른 건국 신화와 큰 차이가 있다. 당시 세워진 여섯 나라는 강력한 왕권 국가가 아니었다. 황금알은 하늘로부터 부여받은 절대적 권위를 상징하는데 수로가 알에서 최초로 탄생했다는 부분은 수로왕이 중심이 되어 여섯 나라를 하나의 강력한 국가 '가야'로 통합하려 했다는 것을 말해 준다.","question":"윗글의 주제로 가장 알맞은 것을 고르십시오.","options":["이 신화는 전형적인 건국 신화의 특성을 지니고 있다.","이 신화는 낙동강 일대의 유용한 지리적 정보를 담고 있다.","이 신화는 고대의 문학 작품으로서 훌륭한 가치를 지니고 있다.","이 신화는 강력한 왕권 국가를 이루려고 한 통합 의식을 반영한다."],"answer":4,"explanation":{"ko":"마지막 문장 '수로왕이 중심이 되어 여섯 나라를 하나의 강력한 국가 가야로 통합하려 했다는 것을 말해 준다'가 주제를 직접 제시합니다. ①전형적인 건국 신화와 큰 차이가 있다고 했습니다.","zh":"文章最後一句「수로왕欲以自身為中心，將六個國家統合為一個強大國家『가야』」直接點出主題。①文中說與典型建國神話有很大差異。正解：④"}},{"id":46,"section":"46~47","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[46,47],"passage":"주가 조작이나 공급 횡령 등의 경제 범죄는 사람에게 직접적인 상해를 가하는 흉악 범죄보다 범죄 정도가 낮다고 생각하기 쉽다. 그러나 경제 범죄의 수법이 날이 갈수록 다양해지고 지능화되어 사회에 미치는 충격과 피해가 막심하다. 최근 증권사 직원의 주가 조작으로 고객들이 천억 넘게 손해 본 사건만 해도 그렇다. 이러한 경제 범죄는 개인 손해를 넘어 국가 경제와도 직결될 수 있다. 따라서 이를 가볍이 여겨서는 안 되며 관대하게 처벌해서도 안 된다. 건전한 경제 질서를 확립하기 위해 경제 사범을 엄벌할 필요가 있다. '한탕 크게 해 먹고 몸으로 때우면 된다'는 한탕주의가 만연하지 않도록 처벌 수준을 더 높여야 한다. 지금까지 미진했던 부당 이익 환수도 앞으로 잘 이루어져 경제 범죄가 재발되지 않도록 해야 할 것이다.","question":"윗글에 나타난 필자의 태도로 가장 알맞은 것을 고르십시오.","options":["경제 범죄가 사회에 미치는 영향을 부정하고 있다.","경제 사범에 대한 처벌을 강화하도록 촉구하고 있다.","경제 사범의 처벌로 생길 결과에 대해 우려하고 있다.","경제 범죄의 다양한 수법을 객관적으로 분석하고 있다."],"answer":2,"explanation":{"ko":"'경제 사범을 엄벌할 필요가 있다', '처벌 수준을 더 높여야 한다'는 표현에서 필자가 처벌 강화를 강하게 주장하고 있습니다.","zh":"「有必要嚴懲經濟罪犯」、「應提高處罰水準」等表達清楚顯示作者強烈主張加強對經濟罪犯的處罰。正解：②"}},{"id":47,"section":"46~47","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[46,47],"passage":"주가 조작이나 공급 횡령 등의 경제 범죄는 사람에게 직접적인 상해를 가하는 흉악 범죄보다 범죄 정도가 낮다고 생각하기 쉽다. 그러나 경제 범죄의 수법이 날이 갈수록 다양해지고 지능화되어 사회에 미치는 충격과 피해가 막심하다. 최근 증권사 직원의 주가 조작으로 고객들이 천억 넘게 손해 본 사건만 해도 그렇다. 이러한 경제 범죄는 개인 손해를 넘어 국가 경제와도 직결될 수 있다. 따라서 이를 가볍이 여겨서는 안 되며 관대하게 처벌해서도 안 된다. 건전한 경제 질서를 확립하기 위해 경제 사범을 엄벌할 필요가 있다. '한탕 크게 해 먹고 몸으로 때우면 된다'는 한탕주의가 만연하지 않도록 처벌 수준을 더 높여야 한다. 지금까지 미진했던 부당 이익 환수도 앞으로 잘 이루어져 경제 범죄가 재발되지 않도록 해야 할 것이다.","question":"윗글의 내용과 같은 것을 고르십시오.","options":["경제 범죄로 생긴 부당 이익을 문제없이 잘 환수해 왔다.","공급을 불법으로 가로채는 범죄는 경제 범죄에 포함된다.","개인이 저지른 주가 조작 범죄는 국가 경제와 큰 관련이 없다.","경제 범죄 수법이 교묘해졌지만 사회에 미치는 충격은 크지 않다."],"answer":2,"explanation":{"ko":"①지금까지 부당 이익 환수가 미진했다고 했습니다. ②'주가 조작이나 공급 횡령 등의 경제 범죄'라고 했으므로 맞습니다. ③국가 경제와도 직결될 수 있다고 했습니다. ④충격과 피해가 막심하다고 했습니다.","zh":"①文中說迄今為止不當利益追回不足。②文中說「주가 조작이나 공급 횡령 등의 경제 범죄」，供給侵吞確實包含在內，說法正確。③文中說可能與國家經濟直接相關。④文中說衝擊和損害極為嚴重。正解：②"}},{"id":48,"section":"48~50","instruction":"다음을 읽고 물음에 답하십시오. (각 2점)","shared_passage_with":[48,49,50],"passage":"예술인은 독창적인 문화를 창조하고 고유한 문화를 보존하는 동시에 예술 활동을 업으로 삼아 수익을 내서 생활하는 사람이다. 그런데 많은 예술인이 기본 생활이 불가능한 적은 수입 탓에 예술 활동을 포기한다. 그 결과 예술인이 감소하며 고령화되는 현상이 나타나고 있다. 2011년에는 생활고로 한 작가가 사망하는 사건까지 일어났다. 이 사건이 계기가 되어 2012년부터 예술인의 권리 보호를 위해 '예술인 복지법'이 시행되었다. 그러나 이는 예술 현장의 실상에 맞지 않아 많은 예술인이 여전히 （？）. 이런 상황에서 올해 예술 활동을 증명하지 못해 지원을 못 받았던 예술인을 위해 예술인 복지법이 개정되었다. 개정안은 이런 예술인도 일반 직업인과 같이 권리를 보호받을 수 있는 대상임을 명확히 하고 있다. 또 예술인이 불리한 처우를 받지 않도록 세부 조치를 마련하는 등 예술인의 고용 안정을 위한 여러 내용을 담고 있다. 앞으로는 이를 바탕으로 유능한 예술인이 활동을 포기하지 않도록 해야 할 것이다.","question":"윗글을 쓴 목적으로 가장 알맞은 것을 고르십시오.","options":["예술인의 자질에 대해 분석하려고","예술 발전의 어려움을 토로하려고","예술 작품의 창작 활동을 설명하려고","예술인 생활 보장의 필요성을 강조하려고"],"answer":4,"explanation":{"ko":"글은 예술인들의 생활고 현실 // ── Group questions by shared_passage_with ──
function buildGroups(qs) {
  const groups = [];
  const used = new Set();
  for (const q of qs) {
    if (used.has(q.id)) continue;
    const shared = q.shared_passage_with;
    if (shared && shared.length > 1) {
      const groupQs = qs.filter(x => shared.includes(x.id));
      groupQs.forEach(x => used.add(x.id));
      groups.push({ passage: q.passage, givenSentence: null, questions: groupQs });
    } else {
      used.add(q.id);
      groups.push({ passage: q.passage, givenSentence: q.given_sentence || null, questions: [q] });
    }
  }
  return groups;
}

}

function renderQuestion(text) {
  return text.replace(/\n/g,'<br>');
}

const CORRECT_PASSWORD = '9191';

function toggleStart() {
  const pw = document.getElementById('passwordInput').value;
  const checked = document.getElementById('termsCheck').checked;
  const errEl = document.getElementById('passwordError');
  const btn = document.getElementById('btnStart');

  if (pw.length > 0 && pw !== CORRECT_PASSWORD) {
    errEl.style.display = 'block';
  } else {
    errEl.style.display = 'none';
  }

  btn.disabled = !(checked && pw === CORRECT_PASSWORD);
}

function showHomeModal() {
  document.getElementById('homeModal').classList.add('show');
}

function closeHomeModal() {
  document.getElementById('homeModal').classList.remove('show');
}

function goHome() {
  closeHomeModal();
  answers = {};
  currentGroup = 0;

  // hide quiz/result, show start
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('headerScore').style.display = 'none';
  document.getElementById('btnHome').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';

  // reset password and checkbox
  document.getElementById('passwordInput').value = '';
  document.getElementById('termsCheck').checked = '';
  document.getElementById('passwordError').style.display = 'none';
  document.getElementById('btnStart').disabled = true;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('scoreDisplay').textContent = '0';
}

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('bottomNav').style.display = 'flex';
  document.getElementById('headerScore').style.display = 'block';
  document.getElementById('btnHome').style.display = 'block';
  renderGroup(0);
}

function renderGroup(idx) {
  currentGroup = idx;
  const g = GROUPS[idx];
  const container = document.getElementById('groupContainer');

  // section label
  const sectionLabel = g.questions[0].section;
  let html = `<div class="group-header">제 ${sectionLabel}번</div>`;

  // given sentence (for Q39-41 type)
  if (g.givenSentence) {
    html += `<div class="given-sentence-wrap">
      <div class="given-sentence-label">📌 주어진 문장 (插入句)</div>
      <div>${renderPassage(g.givenSentence)}</div>
    </div>`;
  }

  // shared passage
  if (g.passage && g.questions.length > 1) {
    html += `<div class="passage-wrap">
      <div class="passage-label">📄 지문 (文章)</div>
      <div class="passage-text">${renderPassage(g.passage)}</div>
    </div>`;
  }

  // each question
  for (const q of g.questions) {
    const answered = answers[q.id] !== undefined;
    const chosen = answers[q.id];
    const correct = q.answer;

    // individual passage (not shared)
    let passageHtml = '';
    if (q.passage && g.questions.length === 1) {
      passageHtml = `<div class="passage-wrap">
        <div class="passage-label">📄 지문 (文章)</div>
        <div class="passage-text">${renderPassage(q.passage)}</div>
      </div>`;
    }

    // options
    let optionsHtml = '<div class="options">';
    q.options.forEach((opt, i) => {
      const num = i + 1;
      let cls = 'option-btn';
      if (answered) {
        cls += ' answered';
        if (num === chosen && num === correct) cls += ' correct';
        else if (num === chosen && num !== correct) cls += ' wrong';
        else if (num !== chosen && num === correct) cls += ' show-correct';
      }
      optionsHtml += `<button class="${cls}" onclick="selectAnswer(${q.id}, ${num})" ${answered ? 'disabled' : ''}>
        <span class="option-num">${num}</span>
        <span>${opt}</span>
      </button>`;
    });
    optionsHtml += '</div>';

    // explanation
    let expHtml = '';
    if (answered) {
      const isCorrect = chosen === correct;
      expHtml = `<div class="explanation show">
        <div class="exp-header ${isCorrect ? 'correct-header' : 'wrong-header'}">
          ${isCorrect ? '✅ 正解！' : `❌ 오답 — 정답은 ${correct}번`}
        </div>
        <div class="exp-body">
          <div class="exp-label">韓文 해설</div>
          <div>${q.explanation.ko}</div>
          <div class="exp-divider"></div>
          <div class="exp-label">中文 解析</div>
          <div>${q.explanation.zh}</div>
        </div>
      </div>`;
    }

    html += `${passageHtml}
    <div class="question-card" id="qcard-${q.id}">
      <div class="question-header">
        <span class="q-number">${q.id}번</span>
        <span class="q-instruction">${q.instruction}</span>
      </div>
      <div class="question-body">
        <div class="question-text">${renderQuestion(q.question)}</div>
        ${optionsHtml}
        ${expHtml}
      </div>
    </div>`;
  }

  container.innerHTML = html;

  // update nav buttons
  document.getElementById('btnPrev').disabled = idx === 0;
  const allGroupAnswered = g.questions.every(q => answers[q.id] !== undefined);
  const isLast = idx === GROUPS.length - 1;
  const btnNext = document.getElementById('btnNext');
  if (isLast && allGroupAnswered) {
    btnNext.textContent = '결과 보기 →';
    btnNext.onclick = showResult;
  } else {
    btnNext.textContent = '다음 →';
    btnNext.onclick = () => navigate(1);
  }

  // update progress
  const answeredCount = Object.keys(answers).length;
  document.getElementById('progressBar').style.width = (answeredCount / 50 * 100) + '%';
  document.getElementById('scoreDisplay').textContent = answeredCount;

  window.scrollTo(0, 0);
}

function selectAnswer(qid, chosen) {
  if (answers[qid] !== undefined) return;
  answers[qid] = chosen;
  renderGroup(currentGroup);

  // auto-scroll to next unanswered in group
  const g = GROUPS[currentGroup];
  const next = g.questions.find(q => answers[q.id] === undefined);
  if (next) {
    setTimeout(() => {
      const el = document.getElementById('qcard-' + next.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }

  // update next button if all answered
  const allAnswered = g.questions.every(q => answers[q.id] !== undefined);
  if (allAnswered) {
    const isLast = currentGroup === GROUPS.length - 1;
    const btnNext = document.getElementById('btnNext');
    if (isLast) {
      btnNext.textContent = '결과 보기 →';
      btnNext.onclick = showResult;
    }
  }
}

function navigate(dir) {
  const next = currentGroup + dir;
  if (next < 0 || next >= GROUPS.length) return;
  renderGroup(next);
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('btnHome').style.display = 'none';

  let correct = 0, wrong = 0, skipped = 0;
  const reviewItems = [];

  RAW.forEach(q => {
    const chosen = answers[q.id];
    if (chosen === undefined) {
      skipped++;
      reviewItems.push({ id: q.id, ok: false, label: '未作答' });
    } else if (chosen === q.answer) {
      correct++;
      reviewItems.push({ id: q.id, ok: true, label: `✓ ${q.answer}번` });
    } else {
      wrong++;
      reviewItems.push({ id: q.id, ok: false, label: `✗ ${chosen}번 → ${q.answer}번` });
    }
  });

  const pct = Math.round(correct / 50 * 100);
  let level = '', emoji = '';
  if (pct >= 90) { level = '탁월！目標分數達成，TOPIK II 6급 수준입니다。'; emoji = '🏆'; }
  else if (pct >= 80) { level = '우수！TOPIK II 5급 수준입니다。계속 노력하세요！'; emoji = '🥇'; }
  else if (pct >= 70) { level = '양호！TOPIK II 4급 수준입니다。틀린 문제를 복습하세요。'; emoji = '👍'; }
  else if (pct >= 60) { level = 'TOPIK II 3급 수준입니다。어휘와 문법을 더 공부해보세요。'; emoji = '📚'; }
  else { level = '더 열심히 공부해봐요！틀린 문제의 해설을 꼭 확인하세요。'; emoji = '💪'; }

  const reviewHtml = reviewItems.map(r =>
    `<div class="review-item">
      <div class="review-dot ${r.ok ? 'ok' : 'fail'}"></div>
      <span class="review-q">${r.id}번</span>
      <span>${RAW[r.id-1].question.substring(0,18).replace(/\n.*/,'').replace(/<[^>]*>/g,'')}...</span>
      <span class="review-status ${r.ok ? 'ok' : 'fail'}">${r.label}</span>
    </div>`
  ).join('');

  const rs = document.getElementById('resultScreen');
  rs.style.display = 'block';
  rs.innerHTML = `
    <div class="result-badge">${emoji}</div>
    <div class="result-title">테스트 완료！</div>
    <div class="result-score-wrap">
      <div class="result-score-main">${correct}<span class="result-score-denom">/ 50</span></div>
      <div class="result-score-label">정답 수 · 정답률 ${pct}%</div>
    </div>
    <div class="result-stats">
      <div class="stat-card">
        <div class="stat-num green">${correct}</div>
        <div class="stat-label">✅ 정답</div>
      </div>
      <div class="stat-card">
        <div class="stat-num red">${wrong}</div>
        <div class="stat-label">❌ 오답</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${skipped}</div>
        <div class="stat-label">⏭ 미응답</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${pct}%</div>
        <div class="stat-label">📊 정답률</div>
      </div>
    </div>
    <div class="result-level"><strong>${level}</strong></div>
    <button class="btn-retry" onclick="location.reload()">🔄 다시 풀기</button>
    <div class="review-section">
      <div class="review-title">📋 문항별 결과</div>
      ${reviewHtml}
    </div>
  `;

  window.scrollTo(0, 0);
  document.getElementById('progressBar').style.width = '100%';
}
</script>
</body>
</html>
